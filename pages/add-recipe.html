<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Recipe</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h2>🍳 Recipe Website</h2>
            <div class="nav-links">
                <a href="recipes.html">Recipes</a>
                <a href="settings.html">Settings</a>
                <button id="logoutBtn" class="btn btn-secondary">Logout</button>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <a href="recipes.html" class="back-link">← Back to Recipes</a>
        
        <div class="form-card">
            <h1>Add New Recipe</h1>
            
            <form id="addRecipeForm">
                <div class="form-group">
                    <label for="recipeName">Recipe Name *</label>
                    <input type="text" id="recipeName" required placeholder="e.g., Chocolate Cake">
                </div>
                
                <div class="form-group">
                    <label for="recipeDescription">Short Description *</label>
                    <input type="text" id="recipeDescription" required placeholder="e.g., Delicious homemade chocolate cake">
                </div>
                
                <div class="form-group">
                    <label for="ingredients">Ingredients *</label>
                    <textarea id="ingredients" rows="6" required placeholder="Enter each ingredient on a new line:&#10;2 cups flour&#10;1 cup sugar&#10;3 eggs"></textarea>
                    <small>Enter each ingredient on a new line</small>
                </div>
                
                <div class="form-group">
                    <label for="steps">Preparation Steps *</label>
                    <textarea id="steps" rows="8" required placeholder="Enter each step on a new line:&#10;Preheat oven to 350°F&#10;Mix dry ingredients&#10;Add wet ingredients"></textarea>
                    <small>Enter each step on a new line</small>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Recipe</button>
                    <a href="recipes.html" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
    
    <script src="../js/storage.js"></script>
    <script>
        // Check authentication
        const currentUser = getCurrentUser();
        if (!currentUser) {
            window.location.href = '../index.html';
        }
        
        // Apply user settings (theme, etc.)
        applyUserSettings();
        
        // Logout functionality
        document.getElementById('logoutBtn').addEventListener('click', () => {
            logout();
            window.location.href = '../index.html';
        });
        
        // Handle form submission
        document.getElementById('addRecipeForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = document.getElementById('recipeName').value.trim();
            const description = document.getElementById('recipeDescription').value.trim();
            const ingredients = document.getElementById('ingredients').value.trim();
            const steps = document.getElementById('steps').value.trim();
            
            // Convert text to arrays
            const ingredientsArray = ingredients.split('\n').filter(i => i.trim());
            const stepsArray = steps.split('\n').filter(s => s.trim());
            
            // Create recipe object
            const recipe = {
                id: Date.now().toString(),
                name,
                description,
                ingredients: ingredientsArray,
                steps: stepsArray,
                userId: currentUser
            };
            
            // Save recipe
            addRecipe(recipe);
            
            // Redirect to recipes page
            window.location.href = 'recipes.html';
        });
    </script>
</body>
</html>
