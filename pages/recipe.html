<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Details</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h2>🍳 Recipe Website</h2>
            <div class="nav-links">
                <a href="recipes.html">Recipes</a>
                <a href="settings.html">Settings</a>
                <button id="logoutBtn" class="btn btn-secondary">Logout</button>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <a href="recipes.html" class="back-link">← Back to Recipes</a>
        
        <div class="recipe-detail">
            <h1 id="recipeName"></h1>
            <p id="recipeDescription" class="recipe-description"></p>
            
            <div class="recipe-section">
                <h2>📝 Ingredients</h2>
                <ul id="ingredientsList"></ul>
            </div>
            
            <div class="recipe-section">
                <h2>👨‍🍳 Preparation Steps</h2>
                <ol id="stepsList"></ol>
            </div>
            
            <div class="action-buttons">
                <button id="cookingModeBtn" class="btn btn-primary">Start Cooking Mode</button>
                <button id="deleteBtn" class="btn btn-danger">Delete Recipe</button>
            </div>
        </div>
        
        <!-- Cooking Mode Modal -->
        <div id="cookingModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Cooking Mode</h2>
                <div id="cookingStep" class="cooking-step"></div>
                <div class="cooking-progress">
                    <span id="stepCounter"></span>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                </div>
                <div class="cooking-controls">
                    <button id="pauseBtn" class="btn btn-secondary">Pause</button>
                    <button id="nextBtn" class="btn btn-primary">Next Step</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="../js/storage.js"></script>
    <script src="../js/cookingMode.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
